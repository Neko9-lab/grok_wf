# GWF project configuration
version: 1

# Optional monorepo packages (spec roots under .gwf/spec/<name>/)
packages: []

# Lifecycle hooks (shell commands). Failures are logged but do not block.
# hooks:
#   after_create:
#     - 'echo created $TASK_JSON_PATH'
#   after_start: []
#   after_finish: []
#   after_archive: []

# Quality commands used by gwf-check (override per project)
quality:
  lint: null
  typecheck: null
  test: null

# Large-repo defaults (gwf-check / check_scope)
guardrails:
  # When true, skills should treat empty allow_globs as a hard stop
  require_scope_json: true
  # Suggested deny patterns to copy into new tasks (not auto-enforced globally)
  suggested_deny_globs:
    - "**/node_modules/**"
    - "**/vendor/**"
    - "**/migrations/**"
    - "uv.lock"
    - "package-lock.json"
    - "pnpm-lock.yaml"
    - "yarn.lock"
